      - heading "Algoritmos de suavizado" [level=2] [ref=e157]
      - paragraph [ref=e158]:
        - text: Toda medición eléctrica llega con ruido. Antes de predecir, hay que decidir cómo limpiarla — y hacerlo
        - strong [ref=e159]: sin conocer la verdad de fondo
        - text: . Se comparan tres formulaciones clásicas y se selecciona la mejor por validación cruzada generalizada (GCV), un criterio que no necesita ground truth.
      - generic [ref=e160]:
        - generic [ref=e161]:
          - heading "Filtro de Kalman" [level=3] [ref=e162]
          - paragraph [ref=e163]: "Estimación bayesiana recursiva: predice, mide y corrige en cada paso."
          - generic [ref=e164]:
            - generic [ref=e165]:
              - generic [ref=e166]: Predicción
              - code [ref=e167]: x̂ₖ⁻ = x̂ₖ₋₁ , Pₖ⁻ = Pₖ₋₁ + Q
            - generic [ref=e168]:
              - generic [ref=e169]: Ganancia
              - code [ref=e170]: Kₖ = Pₖ⁻ / (Pₖ⁻ + R)
            - generic [ref=e171]:
              - generic [ref=e172]: Corrección
              - code [ref=e173]: x̂ₖ = x̂ₖ⁻ + Kₖ (zₖ − x̂ₖ⁻)
            - generic [ref=e174]:
              - generic [ref=e175]: Covarianza
              - code [ref=e176]: Pₖ = (1 − Kₖ) Pₖ⁻
          - list [ref=e177]:
            - listitem [ref=e178]: Q = process_variance = 0.1
            - listitem [ref=e179]: R = measurement_variance = 10
            - listitem [ref=e180]: P₀ = initial_error = 1.0
          - paragraph [ref=e181]: Cuanto mayor es R frente a Q, más confía el filtro en su predicción y menos en la medición ruidosa.
